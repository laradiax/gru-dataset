# Reproducibility configuration for zero-shot proprietary LLM inference.

llm:
  task_setup: "zero-shot"
  provider: "maritaca" # gpt | sonnet | genai | maritaca
  temperature: 0.0

  generation_parameters:
    top_p: "provider_default"
    top_k: "provider_default"
    max_output_tokens: "provider_default"
    frequency_penalty: "provider_default"
    presence_penalty: "provider_default"
    response_format: "prompt_constrained_json"

  prompt_files:
    global_document: "llm/violencia_global.txt"
    sentence_level: "llm/violencia_sentencas.txt"

  sonnet:
    model_name: "anthropic/claude-sonnet-4.5"
    api_key: "${oc.env:OPENROUTER_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"

  gpt:
    model_name: "openai/gpt-5.2"
    api_key: "${oc.env:OPENROUTER_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"

  genai:
    model_name: "gemini-3-flash-preview"
    api_key1: "${oc.env:GENAI_API_KEY}"
    api_key_slots: 7
    quota_rotation: true
    resource_exhausted_cooldown_seconds: 60
    per_rotation_sleep_seconds: 2

  maritaca:
    model_name: "sabia-4"
    api_key: "${oc.env:MARITACA_API_KEY}"
    base_url: "https://chat.maritaca.ai/api"
    max_retries: 3
    timeout_seconds: 45.0
